<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  
  <!-- Hub icon - outer ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#accent)" stroke-width="6" stroke-dasharray="20 10" opacity="0.6"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="35" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
  
  <!-- Task checkmark -->
  <path d="M82 100 L95 113 L120 88" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Orbiting dots representing sessions -->
  <circle cx="100" cy="40" r="8" fill="#3b82f6"/>
  <circle cx="155" cy="100" r="8" fill="#22c55e"/>
  <circle cx="100" cy="160" r="8" fill="#f59e0b"/>
  <circle cx="45" cy="100" r="8" fill="#8b5cf6"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="48" x2="100" y2="65" stroke="#64748b" stroke-width="2" opacity="0.5"/>
  <line x1="148" y1="100" x2="135" y2="100" stroke="#64748b" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="152" x2="100" y2="135" stroke="#64748b" stroke-width="2" opacity="0.5"/>
  <line x1="52" y1="100" x2="65" y2="100" stroke="#64748b" stroke-width="2" opacity="0.5"/>
</svg>
